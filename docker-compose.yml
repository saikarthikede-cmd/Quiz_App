services:
  postgres:
    image: postgres:16-alpine
    container_name: quiz-app-postgres
    environment:
      POSTGRES_DB: quiz_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Karthik
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quiz_app"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: quiz-app-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app-init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quiz-app-init
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: quiz_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Karthik
      DATABASE_URL: postgresql://postgres:Karthik@postgres:5432/quiz_app
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      API_PORT: 4000
      GAME_PORT: 4001
      WORKER_PORT: 4002
      FRONTEND_URL: http://localhost:3000
      FRONTEND_URLS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_GAME_URL: http://localhost:4001
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER:-quiz-app}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-quiz-app-users}
      ACCESS_TOKEN_TTL_MINUTES: ${ACCESS_TOKEN_TTL_MINUTES:-15}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-30}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-saikarthik.ede@fissionlabs.com}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    command: >
      sh -lc "pnpm --filter @quiz-app/db exec tsx src/migrate.ts &&
      pnpm --filter @quiz-app/api-server exec tsx src/seed.ts"
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quiz-app-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: quiz_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Karthik
      DATABASE_URL: postgresql://postgres:Karthik@postgres:5432/quiz_app
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      API_PORT: 4000
      FRONTEND_URL: http://localhost:3000
      FRONTEND_URLS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER:-quiz-app}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-quiz-app-users}
      ACCESS_TOKEN_TTL_MINUTES: ${ACCESS_TOKEN_TTL_MINUTES:-15}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-30}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-saikarthik.ede@fissionlabs.com}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    command: node services/api-server/dist/server.js
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  game:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quiz-app-game
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: quiz_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Karthik
      DATABASE_URL: postgresql://postgres:Karthik@postgres:5432/quiz_app
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      GAME_PORT: 4001
      FRONTEND_URL: http://localhost:3000
      FRONTEND_URLS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER:-quiz-app}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-quiz-app-users}
    command: node services/game-server/dist/server.js
    ports:
      - "4001:4001"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quiz-app-worker
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: quiz_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Karthik
      DATABASE_URL: postgresql://postgres:Karthik@postgres:5432/quiz_app
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      WORKER_PORT: 4002
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER:-quiz-app}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-quiz-app-users}
    command: node services/worker-server/dist/server.js
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quiz-app-frontend
    depends_on:
      api:
        condition: service_healthy
      game:
        condition: service_started
    environment:
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_GAME_URL: http://localhost:4001
    command: sh -lc "pnpm --filter @quiz-app/frontend exec next start -H 0.0.0.0 -p 3000"
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
